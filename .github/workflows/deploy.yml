name: Deploy-Infra-Coulibaly-V2
on: [push]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v2

      - name: Installation de l'outil OC
        uses: redhat-actions/oc-installer@v1

      - name: Connexion au Sandbox
        run: |
          oc login --token=${{ secrets.OC_TOKEN }} --server=${{ secrets.OC_SERVER }} --insecure-skip-tls-verify
          
      - name: Deploiement des VMs
        run: |
          # Cette commande installe tout ce qui est dans le dossier virtualisation
          oc apply -f 01-virtualisation/
