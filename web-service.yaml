apiVersion: v1
kind: Service
metadata:
  name: service-web
  namespace: bbamycoulibaly-dev
spec:
  selector:
    kubevirt.io/domain: vm2
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: route-web
  namespace: bbamycoulibaly-dev
spec:
  to:
    kind: Service
    name: service-web
  port:
    targetPort: 80
