apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-db
  namespace: bbamycoulibaly-dev
  labels:
    app: mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
      - name: mysql
        image: mysql:5.7
        env:
        - name: MYSQL_ROOT_PASSWORD
          value: "AmyPass2026"
        ports:
        - containerPort: 3306
        # --- SECTION AJOUTÉE POUR LIMITER LA RAM ---
        resources:
          requests:
            memory: "512Mi"
          limits:
            memory: "1Gi"
        # ------------------------------------------
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-service
  namespace: bbamycoulibaly-dev
spec:
  selector:
    app: mysql
  ports:
    - protocol: TCP
      port: 3306
      targetPort: 3306
