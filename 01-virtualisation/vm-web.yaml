apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: vm2
  namespace: bbamycoulibaly-dev
  labels:
    app: vm-web
    kubevirt.io/domain: vm2
spec:
  runStrategy: Always # <--- Si elle s'éteint, elle se rallumera toute seule !
  template:
    metadata:
      labels:
        kubevirt.io/domain: vm2
    spec:
      domain:
        cpu:
          cores: 1
        devices:
          interfaces:
            - name: default
              masquerade: {}
              ports:
                - port: 80 # On garde la porte ouverte pour le web
          disks:
            - bootOrder: 1
              disk:
                bus: virtio
              name: rootdisk
            - disk:
                bus: virtio
              name: cloudinitdisk
        memory:
          guest: 800Mi # Un juste milieu entre 1Gi et 512Mi
      networks:
        - name: default
          pod: {}
      volumes:
        - containerDisk:
            image: quay.io/containerdisks/ubuntu:22.04
          name: rootdisk
        - cloudInitNoCloud:
            userData: |
              #cloud-config
              user: ubuntu
              password: AmyPass2026
              chpasswd: { expire: False }
              ssh_pwauth: True
              # ON NE FAIT AUCUNE INSTALLATION ICI POUR NE PAS SURCHARGER
          name: cloudinitdisk
